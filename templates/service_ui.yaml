apiVersion: v1
kind: Service
metadata:
  name: {{ include "teanote.fullname" . }}-ui
  labels:
    {{- include "teanote.labels" . | nindent 4 }}
    app: ui
spec:
  type: {{ .Values.service.ui.type }}
  ports:
    - port: {{ .Values.service.ui.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "teanote.selectorLabels" . | nindent 4 }}
    app: ui