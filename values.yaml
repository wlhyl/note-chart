# Default values for teanote.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  api:
    repository: note/api
    pullPolicy: IfNotPresent
    tag: "latest"
  ui:
    repository: note/spa
    pullPolicy: IfNotPresent
    tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  ui:
    type: ClusterIP
    port: 80
    targetPort: 80
  api:
    type: ClusterIP
    port: 8080
    targetPort: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hostname: chart-example.local
  ui_path: /
  api_path: /api
  pathType: Prefix
  tls:
    enabled: false  # 默认禁用HTTPS
    # secretName: horo-tls-secret
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

livenessProbe:
  api:
    timeoutSeconds: 1
  ui:
    timeoutSeconds: 1

readinessProbe:
  api:
    timeoutSeconds: 1
  ui:
    timeoutSeconds: 1

note:
  user: admin
  password: password

#  token 过期时间，单位秒，默认值：86400(1天)
token:
  expire_seconds: 86400

# 只支持外部mysql
database:
  type: mysql
  host: db
  user: root
  password: password
  database: note

# 仅支持外部reids
redis:
  host: redis
  password: password
  database: 0

# api 的日志级别
log:
  level: info

# 上传图片设置
imageUpload: {}
# imageUpload:
  # 上传图片后文件名的前缀
  # 默认值：images
  # prefix:
  #   images
  # 默认值 /app/tmp
  # tmp_dir:
  #   /app/tmp

# 存储图片的s3配置
s3:
  endpoint: https://s3.amazonaws.com
  bucket: example
  access_key: example
  secret_key: example
  # 默认值：false
  # path_style:
  #   false
  # 默认值：""
  # s3_region: ""

# 数据库备份配置（可选）
backup:
  enabled: false  # 是否启用备份
  schedule: "0 2 * * *"  # cron表达式，默认每天凌晨2点（Asia/Shanghai时区）
  retention: 5  # 保留最近的备份数量
  image:
    repository: "ubuntu"  # 备份使用的镜像
    tag: "22.04"          # 镜像标签
    pullPolicy: IfNotPresent
  age:
    publicKey: ""  # age加密公钥
  s3:
    prefix: "backup/"  # 备份文件路径前缀